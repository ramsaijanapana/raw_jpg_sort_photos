name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build:
    name: Build ${{ matrix.target }}
    needs: analyze-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: apk
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: macos-latest
            target: ios
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (Android)
        if: matrix.target == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true

      - run: flutter pub get

      - name: Build
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            ios) flutter build ios --release --no-codesign ;;
            apk) flutter build apk --release ;;
            *)   flutter build ${{ matrix.target }} --release ;;
          esac

      - name: Package artifact
        if: matrix.target != 'ios'
        shell: bash
        run: |
          mkdir -p ../dist
          case "${{ matrix.target }}" in
            linux)
              tar -C build/linux/x64/release/bundle -czf ../dist/photo_sorter-linux-x64.tar.gz . ;;
            apk)
              cp build/app/outputs/flutter-apk/app-release.apk ../dist/photo_sorter-android.apk ;;
            windows)
              cp -r build/windows/x64/runner/Release ../dist/photo_sorter-windows-x64 ;;
            macos)
              ditto -c -k --keepParent build/macos/Build/Products/Release/photo_sorter.app ../dist/photo_sorter-macos.zip ;;
          esac

      - name: Upload artifact
        if: matrix.target != 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: photo_sorter-${{ matrix.target }}
          path: dist/
          retention-days: 14
